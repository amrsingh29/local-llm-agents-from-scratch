site_name: Gemma Local AI
site_description: Documentation for building local AI agents from scratch using Gemma.
site_dir: site
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.snippets:
      base_path: .
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - admonition
  - md_in_html

exclude_docs: |
  .venv/
  venv/
  env/
  site/
  .mkdocs-cache/
  .git/
  .github/
  .obsidian/
  **/*.py
  **/*.pyc
  __pycache__/
  requirements.txt
  **/.DS_Store
